<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG + Agent Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <h1>RAG + Agentic AI Analytics</h1>
        <p>Run analysis queries, ingest data, and visualize trend signals in one dashboard.</p>
      </section>

      <section class="grid cards" id="kpiCards">
        <article class="card kpi">
          <h2>Revenue Trend</h2>
          <p id="revenueTotal">-</p>
        </article>
        <article class="card kpi">
          <h2>Indexed Sources</h2>
          <p id="indexedSources">-</p>
        </article>
      </section>

      <section class="grid two-col">
        <article class="card chart-card">
          <h2>Quarterly Revenue (Millions)</h2>
          <canvas id="revenueChart"></canvas>
        </article>
        <article class="card chart-card">
          <h2>Product Revenue Share (%)</h2>
          <canvas id="productChart"></canvas>
        </article>
      </section>

      <section class="grid two-col">
        <article class="card">
          <h2>Ask the Agent</h2>
          <form id="analyzeForm">
            <label for="query">Analysis Query</label>
            <textarea id="query" required placeholder="What are the key growth opportunities in Q3?"></textarea>
            <label for="contextQuery">Context Query (optional)</label>
            <input id="contextQuery" type="text" placeholder="company performance metrics" />
            <button type="submit">Run Analysis</button>
          </form>
          <div id="analysisResult" class="result"></div>
        </article>

        <article class="card">
          <h2>Ingest Data</h2>
          <form id="ingestForm">
            <label for="fileInput">Upload .txt or .csv</label>
            <input id="fileInput" type="file" accept=".txt,.csv" required />
            <button type="submit">Upload & Ingest</button>
          </form>
          <div id="ingestResult" class="result"></div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
